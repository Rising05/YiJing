services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yijing}
      MYSQL_USER: ${MYSQL_USER:-yijing}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - yijing_mysql_data:/var/lib/mysql
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/server/.env.production
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-yijing}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-yijing}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - yijing_uploads:/app/apps/server/uploads
    command: >
      sh -c "./node_modules/.bin/prisma migrate deploy --schema apps/server/prisma/schema.prisma
      && node apps/server/dist/apps/server/src/main.js"

volumes:
  yijing_mysql_data:
  yijing_uploads:
