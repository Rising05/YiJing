services:
  mysql:
    image: mysql:8.4
    container_name: yijing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yijing
      MYSQL_USER: yijing
      MYSQL_PASSWORD: yijing
    ports:
      - "3306:3306"
    volumes:
      - yijing_mysql_data:/var/lib/mysql
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  yijing_mysql_data:
